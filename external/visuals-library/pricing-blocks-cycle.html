<script>
var scene = document.getElementById('scene');
var large = document.getElementById('large');
var med   = document.getElementById('med');
var small = document.getElementById('small');

var DUR = 6000;
var t0  = performance.now();

var KT = [0, 1/3, 2/3, 1];
var LV = [0, -176, -98,  0];
var MV = [0,   98, -78,  0];
var SV = [0,   78, 176,  0];

var LC = 264;
var MC = 166;
var SC = 88;

function eio(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

function lerp(vals, t) {
  for (var i = 0; i < KT.length - 1; i++) {
    if (t <= KT[i + 1]) {
      var s = (t - KT[i]) / (KT[i + 1] - KT[i]);
      return vals[i] + (vals[i + 1] - vals[i]) * eio(s);
    }
  }
  return vals[vals.length - 1];
}

function tick() {
  var t = ((performance.now() - t0) % DUR) / DUR;

  var ly = lerp(LV, t);
  var my = lerp(MV, t);
  var sy = lerp(SV, t);

  large.setAttribute('transform', 'translate(0,' + ly + ')');
  med.setAttribute(  'transform', 'translate(0,' + my + ')');
  small.setAttribute('transform', 'translate(0,' + sy + ')');

  var order = [
    { el: large, vc: LC + ly },
    { el: med,   vc: MC + my },
    { el: small, vc: SC + sy }
  ];
  order.sort(function(a, b) { return b.vc - a.vc; });
  order.forEach(function(b) { scene.appendChild(b.el); });

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
