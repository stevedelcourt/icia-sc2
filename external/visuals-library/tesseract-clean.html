<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tesseract</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
canvas{display:block;background:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

/* ── 16 vertices: all (±1,±1,±1,±1) ── */
const VERTS = Array.from({length:16},(_,i)=>[
  ((i>>0)&1)*2-1, ((i>>1)&1)*2-1,
  ((i>>2)&1)*2-1, ((i>>3)&1)*2-1
]);

/* ── 32 edges: vertices differing in exactly 1 coord ── */
const EDGES=[];
for(let i=0;i<16;i++)
  for(let j=i+1;j<16;j++){
    const d=VERTS[i].reduce((s,v,k)=>s+(v!==VERTS[j][k]?1:0),0);
    if(d===1)EDGES.push([i,j]);
  }

const lerp=(a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));

function rot4(v,a,b,θ){
  const r=[...v],c=Math.cos(θ),s=Math.sin(θ);
  r[a]=c*v[a]-s*v[b]; r[b]=s*v[a]+c*v[b];
  return r;
}

function project(v4,t,S){
  let p=[...v4];
  p=rot4(p,0,3,t*0.44);
  p=rot4(p,1,2,t*0.29);
  p=rot4(p,0,1,t*0.17);
  p=rot4(p,2,3,t*0.23);

  const[x,y,z,w]=p;

  /* 4D→3D  (d4>2 prevents singularity: L2-norm of vertices = 2) */
  const d4=2.5, f4=1/(d4-w);
  const[x3,y3,z3]=[x*f4,y*f4,z*f4];

  /* 3D tilt ~22° around X */
  const tilt=0.38;
  const y3t=Math.cos(tilt)*y3-Math.sin(tilt)*z3;
  const z3t=Math.sin(tilt)*y3+Math.cos(tilt)*z3;

  /* 3D→2D */
  const d3=2.5, f3=1/(d3-z3t);
  const sc=S*0.63;

  return{
    sx: S/2+x3*f3*sc,
    sy: S/2+y3t*f3*sc,
    w,
    depth: z3t+w*0.15
  };
}

/* ── Retina-aware resize ── */
let DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const S=Math.min(window.innerWidth,window.innerHeight);
  canvas.style.width=canvas.style.height=S+'px';
  canvas.width=canvas.height=Math.round(S*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

function draw(now){
  const t=now*0.001;
  const S=Math.round(canvas.width/DPR);

  /* Transparent background */
  ctx.clearRect(0,0,S,S);

  /* Project */
  const P=VERTS.map((v,vi)=>{
    const p=project(v,t,S);
    const pulse=1+0.18*Math.sin(t*2.6+vi*0.44);
    return{...p,pulse};
  });

  /* Sort edges back→front */
  const sorted=EDGES.map(([i,j])=>({
    i,j,
    w:(P[i].w+P[j].w)*0.5,
    depth:(P[i].depth+P[j].depth)*0.5
  })).sort((a,b)=>a.depth-b.depth);

  /* Draw edges — dark lines, opacity = depth */
  ctx.lineCap='round';
  sorted.forEach(({i,j,w})=>{
    const p1=P[i],p2=P[j];
    const tw=Math.max(0,Math.min(1,(w+1)*0.5));
    const alpha=lerp(0.07,0.82,tw);
    const lw=lerp(0.3,2.0,tw);

    ctx.save();
    ctx.lineWidth=lw;
    ctx.strokeStyle=`rgba(0,0,0,${alpha.toFixed(3)})`;
    ctx.beginPath();
    ctx.moveTo(p1.sx,p1.sy);
    ctx.lineTo(p2.sx,p2.sy);
    ctx.stroke();
    ctx.restore();
  });

  /* Draw vertices — small dark squares */
  P.forEach(p=>{
    const tw=Math.max(0,Math.min(1,(p.w+1)*0.5));
    const alpha=lerp(0.06,0.88,tw);
    const sz=lerp(1.0,4.0,tw)*p.pulse;
    ctx.fillStyle=`rgba(0,0,0,${alpha.toFixed(3)})`;
    ctx.fillRect(p.sx-sz/2,p.sy-sz/2,sz,sz);
  });

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
