<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tesseract</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
canvas{display:block;background:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ═══════════════════════════════════════════════════════════════
   TESSERACT — 4D color field
   The color of each face is derived from its centroid's exact
   position in 4D space after rotation:
     Hue   = atan2(y4, x4)  — angle in the 4D XY plane
     Sat   = √(x4²+y4²)     — radial distance in XY
     Light = z4              — Z depth in 4D
     Alpha = w4              — W nearness (the 4D depth cue)
   Every rotation moves face centroids through this continuous
   color field — creating transitions that are geometrically exact.
═══════════════════════════════════════════════════════════════ */

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

/* ── 16 vertices ── */
const VERTS=Array.from({length:16},(_,i)=>[
  ((i>>0)&1)*2-1, ((i>>1)&1)*2-1,
  ((i>>2)&1)*2-1, ((i>>3)&1)*2-1
]);

/* ── 32 edges ── */
const EDGES=[];
for(let i=0;i<16;i++)
  for(let j=i+1;j<16;j++){
    const d=VERTS[i].reduce((s,v,k)=>s+(v!==VERTS[j][k]?1:0),0);
    if(d===1)EDGES.push([i,j]);
  }

/* ── 24 faces: fix 2 coords, vary the other 2
   C(4,2)=6 dimension pairs × 4 sign combinations = 24          ── */
const FACES=[];
for(let d1=0;d1<4;d1++)
  for(let d2=d1+1;d2<4;d2++){
    const fr=[0,1,2,3].filter(d=>d!==d1&&d!==d2);
    for(let s1=-1;s1<=1;s1+=2)
      for(let s2=-1;s2<=1;s2+=2){
        const vi=[];
        for(let a=-1;a<=1;a+=2)
          for(let b=-1;b<=1;b+=2){
            const c=[0,0,0,0];
            c[d1]=s1;c[d2]=s2;c[fr[0]]=a;c[fr[1]]=b;
            vi.push(VERTS.findIndex(v=>v.every((x,k)=>x===c[k])));
          }
        FACES.push([vi[0],vi[2],vi[3],vi[1]]); // CCW winding
      }
  }

const lerp=(a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));
const clamp=(v,lo,hi)=>Math.min(hi,Math.max(lo,v));

function rot4(v,a,b,θ){
  const r=[...v],c=Math.cos(θ),s=Math.sin(θ);
  r[a]=c*v[a]-s*v[b]; r[b]=s*v[a]+c*v[b];
  return r;
}

/* ── Transform: returns screen position + rotated 4D coords ── */
function transform(v4,t,S){
  let p=[...v4];
  p=rot4(p,0,3,t*0.44);
  p=rot4(p,1,2,t*0.29);
  p=rot4(p,0,1,t*0.17);
  p=rot4(p,2,3,t*0.23);

  const r4=[...p];
  const[x,y,z,w]=p;

  const d4=2.5, f4=1/(d4-w);
  const x3=x*f4, y3=y*f4, z3=z*f4;

  const tilt=0.38;
  const y3t=Math.cos(tilt)*y3-Math.sin(tilt)*z3;
  const z3t=Math.sin(tilt)*y3+Math.cos(tilt)*z3;

  const f3=1/(2.5-z3t);
  const sc=S*0.63;

  return{
    sx:S/2+x3*f3*sc,
    sy:S/2+y3t*f3*sc,
    r4,
    w,
    depth:z3t+w*0.15
  };
}

/* ── Color field: maps a 4D position to HSLA ────────────────── */
function colorAt(x4,y4,z4,w4){
  const hue=((Math.atan2(y4,x4)*180/Math.PI)+360)%360;
  const xyR=clamp(Math.sqrt(x4*x4+y4*y4)/1.42,0,1);
  const sat=Math.round(lerp(42,92,xyR));
  const lit=Math.round(lerp(34,66,(z4+2)/4));
  const alpha=lerp(0.05,0.54,(w4+2)/4);
  return{hue,sat,lit,alpha};
}

/* ── Retina resize ── */
let DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const S=Math.min(window.innerWidth,window.innerHeight);
  canvas.style.width=canvas.style.height=S+'px';
  canvas.width=canvas.height=Math.round(S*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

/* ════════════════ RENDER ════════════════ */
function draw(now){
  const t=now*0.001;
  const S=Math.round(canvas.width/DPR);

  ctx.clearRect(0,0,S,S);

  const P=VERTS.map(v=>transform(v,t,S));

  /* ── Faces: back → front ── */
  const faceList=FACES.map(verts=>{
    const fv=verts.map(i=>P[i]);
    /* Face centroid in 4D space */
    const c4=[0,0,0,0];
    fv.forEach(p=>p.r4.forEach((v,k)=>{c4[k]+=v/4}));
    return{fv,c4,avgDepth:fv.reduce((s,p)=>s+p.depth,0)/4};
  }).sort((a,b)=>a.avgDepth-b.avgDepth);

  faceList.forEach(({fv,c4})=>{
    /* Sort vertices CCW by angle around 2D centroid */
    const fcx=fv.reduce((s,p)=>s+p.sx,0)/4;
    const fcy=fv.reduce((s,p)=>s+p.sy,0)/4;
    const verts=[...fv].sort((a,b)=>
      Math.atan2(a.sy-fcy,a.sx-fcx)-Math.atan2(b.sy-fcy,b.sx-fcx)
    );

    /* 2D signed area → front face (positive) or back face (negative) */
    let area=0;
    for(let i=0;i<4;i++){
      const j=(i+1)%4;
      area+=verts[i].sx*verts[j].sy-verts[j].sx*verts[i].sy;
    }

    const col=colorAt(c4[0],c4[1],c4[2],c4[3]);
    /* Back faces: same hue but half opacity and slightly cooler */
    const alpha=area>0 ? col.alpha : col.alpha*0.48;
    const hue  =area>0 ? col.hue   : (col.hue+22)%360;
    const lit  =area>0 ? col.lit   : col.lit-6;

    ctx.save();
    ctx.beginPath();
    verts.forEach((p,i)=>i?ctx.lineTo(p.sx,p.sy):ctx.moveTo(p.sx,p.sy));
    ctx.closePath();
    ctx.fillStyle=`hsla(${hue.toFixed(1)},${col.sat}%,${lit}%,${alpha.toFixed(3)})`;
    ctx.fill();
    ctx.restore();
  });

  /* ── Edges: dark, depth-weighted ── */
  ctx.lineCap='round';
  EDGES.map(([i,j])=>({
    i,j,
    tw:clamp((P[i].w+P[j].w)*0.5/2+0.5,0,1),
    depth:(P[i].depth+P[j].depth)*0.5
  }))
  .sort((a,b)=>a.depth-b.depth)
  .forEach(({i,j,tw})=>{
    ctx.save();
    ctx.lineWidth=lerp(0.22,1.7,tw);
    ctx.strokeStyle=`rgba(0,0,0,${lerp(0.05,0.68,tw).toFixed(3)})`;
    ctx.beginPath();
    ctx.moveTo(P[i].sx,P[i].sy);
    ctx.lineTo(P[j].sx,P[j].sy);
    ctx.stroke();
    ctx.restore();
  });

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
