<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe — 3D Volume</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #eae6e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/*
  Fibonacci sphere — 500 points on a unit sphere.

  The uploaded SVG is the orthographic front-projection of this exact
  distribution (N=500, golden angle). Each dot's SVG radius encodes its
  z-depth: r = 0.4 + depth × 2.4, where depth = (z3 + 1) / 2.

  Here we regenerate the true 3D coordinates, rotate around the Y axis,
  apply a fixed view tilt so we look slightly from above, project with
  perspective, and render with size + opacity as depth cues.

  At t = 0 the front view is identical to the source SVG.
*/

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Responsive canvas ────────────────────────────────────────────────────
const dpr  = window.devicePixelRatio || 1;
const CSS  = Math.min(window.innerWidth * 0.88, window.innerHeight * 0.88, 580);
canvas.width        = CSS * dpr;
canvas.height       = CSS * dpr;
canvas.style.width  = CSS + 'px';
canvas.style.height = CSS + 'px';
ctx.scale(dpr, dpr);

const CX       = CSS / 2;
const CY       = CSS / 2;
const SPHERE_R = CSS * 0.39;     // matches original R=80 in 200px cell, scaled up
const PERSP    = CSS * 1.4;      // perspective distance
const PERIOD   = 22;             // seconds per full revolution

// ── Fibonacci sphere — 500 points ────────────────────────────────────────
// Golden angle: same constant used in d9() of the math-graphics generator.
// y3 ∈ [−1, 1], x3 and z3 define the azimuth. ||x3,y3,z3|| = 1 always.
const N    = 500;
const PHI  = Math.PI * (3 - Math.sqrt(5));   // ≈ 2.399 rad (golden angle)
const pts  = [];

for (let i = 0; i < N; i++) {
  const y3  = 1 - (i + 0.5) / N * 2;         // −1 (south) → +1 (north)
  const rho = Math.sqrt(Math.max(0, 1 - y3 * y3));
  const th  = PHI * i;
  pts.push({ x3: rho * Math.cos(th), y3, z3: rho * Math.sin(th) });
}

// BASE dot-size scale: original code used inner-coord R = 80, dot sizes 0.4→2.8.
// We scale those same sizes to our SPHERE_R.
const BASE = SPHERE_R / 80;

// ── Fixed view tilt (X-axis rotation, constant) ───────────────────────────
// Tilts the sphere so we see it from ~13° above the equator.
// This breaks the flat "coin-spin" look and reveals the polar caps.
const TILT  = 0.23;
const cos_T = Math.cos(TILT);
const sin_T = Math.sin(TILT);

// ── Animation loop ────────────────────────────────────────────────────────
let t0 = null;

function frame(ts) {
  if (!t0) t0 = ts;
  const angle = ((ts - t0) / 1000 / PERIOD) * Math.PI * 2;
  const cos_A = Math.cos(angle);
  const sin_A = Math.sin(angle);

  ctx.clearRect(0, 0, CSS, CSS);

  // Project all 500 points
  const proj = pts.map(({ x3, y3, z3 }) => {

    // 1. Rotate around sphere's Y axis (the "longitude" spin)
    let rx =  x3 * cos_A + z3 * sin_A;
    let ry =  y3;
    let rz = -x3 * sin_A + z3 * cos_A;

    // 2. Fixed view tilt — rotate around X in view space
    const ry2 = ry * cos_T - rz * sin_T;
    const rz2 = ry * sin_T + rz * cos_T;
    ry = ry2;  rz = rz2;

    // 3. Perspective projection
    //    zPx: z in canvas pixels (positive = toward viewer)
    const zPx = rz * SPHERE_R;
    const psc = PERSP / (PERSP - zPx);          // >1 front, <1 back

    const px  = CX  + rx * SPHERE_R * psc;
    const py  = CY  - ry * SPHERE_R * psc;      // flip y: canvas y-down, y3 y-up

    // 4. Depth value 0 (far back) → 1 (far front)
    //    Uses rz, which is the z-component after tilt — same axis as original z3
    const depth = (rz + 1) / 2;

    // 5. Dot size — matches original SVG encoding (sz = 0.4 + depth × 2.4)
    //    multiplied by our scale factor and perspective enlargement
    const dotR = (0.4 + depth * 2.4) * BASE * psc;

    return { px, py, depth, dotR, rz };
  });

  // Sort back → front so front dots paint over back dots (painter's algorithm)
  proj.sort((a, b) => a.rz - b.rz);

  // Draw
  for (const { px, py, depth, dotR } of proj) {
    const op = 0.10 + depth * 0.90;             // back = faint, front = opaque
    ctx.beginPath();
    ctx.arc(px, py, Math.max(0.3, dotR), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(22,22,22,${op.toFixed(3)})`;
    ctx.fill();
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
