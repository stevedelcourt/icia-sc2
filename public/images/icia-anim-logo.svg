  <!--
    ANIMATION 1 : STAMP
    Chaque carre apparait depuis l'echelle 0 avec un rebond spring,
    le bleu en premier, le rouge 200ms apres.
    Cycle : 1s animation + 5s pause = 6s total.
    Technique : wrapper translate() centre l'origine sur le centre du carre,
    l'animateTransform scale opère depuis ce centre.
  -->

  <!-- Carre bleu : centre (1509, 357) -->
  <g transform="translate(1509, 357)">
    <g>
      <animateTransform id="sb"
        attributeName="transform"
        type="scale"
        values="0; 1.22; 0.91; 1.05; 1"
        keyTimes="0; 0.45; 0.68; 0.84; 1"
        calcMode="spline"
        keySplines="0.22 0 0.1 1; 0.36 0 0.66 1; 0.36 0 0.66 1; 0.36 0 0.66 1"
        dur="1s"
        begin="0s; sb.end + 5s"
        fill="remove"/>
      <rect x="-60" y="-60" width="120" height="120" fill="rgb(0,5,146)"/>
    </g>
  </g>

  <!-- Carre rouge : centre (1509, 536) -->
  <g transform="translate(1509, 536)">
    <g>
      <animateTransform id="sr"
        attributeName="transform"
        type="scale"
        values="0; 1.22; 0.91; 1.05; 1"
        keyTimes="0; 0.45; 0.68; 0.84; 1"
        calcMode="spline"
        keySplines="0.22 0 0.1 1; 0.36 0 0.66 1; 0.36 0 0.66 1; 0.36 0 0.66 1"
        dur="1s"
        begin="0.2s; sr.end + 5s"
        fill="remove"/>
      <rect x="-60" y="-60" width="120" height="120" fill="rgb(255,0,0)"/>
    </g>
  </g>

</svg>
