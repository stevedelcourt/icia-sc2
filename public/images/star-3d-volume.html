<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Volume — 3D</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #eae6e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/*
  3D sphere of spikes — volumetric interpretation of the starburst.

  The original 2D star is treated as the ORTHOGRAPHIC FRONT PROJECTION
  of a sphere of spikes. Each spike is a unit vector on the sphere:

    nx = (len / MAX_LEN) * cos(angle_2d)
    ny = (len / MAX_LEN) * sin(angle_2d)
    nz = ±sqrt(1 - nx² - ny²)

  Short spikes in 2D → high elevation on sphere (near poles).
  Long spikes in 2D → near equator of sphere.

  When viewed from the front, the projection reproduces the original star exactly.
  As the sphere rotates, spikes arc through 3D space. Perspective + depth cues
  (opacity, line weight, dot size) complete the illusion.
*/

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Responsive setup ──────────────────────────────────────────────────────
const dpr  = window.devicePixelRatio || 1;
const CSS  = Math.min(window.innerWidth * 0.88, window.innerHeight * 0.88, 580);
canvas.width        = CSS * dpr;
canvas.height       = CSS * dpr;
canvas.style.width  = CSS + 'px';
canvas.style.height = CSS + 'px';
ctx.scale(dpr, dpr);

const CX       = CSS / 2;
const CY       = CSS / 2;
const SPHERE_R = CSS * 0.40;   // sphere radius in CSS px
const PERSP    = CSS * 1.35;   // perspective distance — larger = flatter 3D
const PERIOD   = 18;           // seconds per full revolution

// ── Original star data: [angle_degrees, spike_length] ────────────────────
// (starburst from the math-graphics set; lengths vary 37–80)
const RAW = [
  [  0, 72], [ 14, 55], [ 29, 80], [ 44, 61], [ 62, 51],
  [ 78, 75], [ 96, 60], [113, 64], [131, 54], [149, 70],
  [166, 49], [182, 63], [196, 52], [212, 66], [229, 58],
  [249, 73], [267, 55], [285, 49], [305, 69], [323, 53],
  [341, 49], [354, 66], [ 49, 42], [168, 37]
];
const MAX_LEN = 80;

// ── Build 3D unit vectors ─────────────────────────────────────────────────
//
// The projection of each spike onto the front (Z) plane must equal the
// original 2D vector. Because:
//   projected_x = nx * SPHERE_R  →  must equal  cos(alpha) * len
//   projected_y = ny * SPHERE_R  →  must equal  sin(alpha) * len
//
// With SPHERE_R = MAX_LEN we get:
//   nx = (len / MAX_LEN) * cos(alpha)
//   ny = (len / MAX_LEN) * sin(alpha)
//   |nz| = sqrt(1 - nx² - ny²)
//
// nz sign alternates so spikes are distributed across both hemispheres.
//
const spikes = RAW.map(([deg, len], i) => {
  const a   = deg * Math.PI / 180;
  const r   = len / MAX_LEN;
  const nx  = r * Math.cos(a);
  const ny  = r * Math.sin(a);                      // SVG convention: y-down
  const zmg = Math.sqrt(Math.max(0, 1 - nx*nx - ny*ny));
  const nz  = (i % 2 === 0) ? zmg : -zmg;           // interleave hemispheres
  return { nx, ny, nz };
});

// ── Fixed view tilt ──────────────────────────────────────────────────────
// We look at the sphere from slightly above (X-axis rotation, constant).
// This breaks the flat "coin spin" look and reveals that the axis of
// rotation is the sphere's own Y axis, not the screen plane.
const TILT    = 0.20;                               // ≈ 11.5° downward tilt
const cos_T   = Math.cos(TILT);
const sin_T   = Math.sin(TILT);

// ── Animation loop ────────────────────────────────────────────────────────
let t0 = null;

function frame(ts) {
  if (!t0) t0 = ts;
  const elapsed = (ts - t0) / 1000;
  const angle   = (elapsed / PERIOD) * Math.PI * 2;
  const cos_A   = Math.cos(angle);
  const sin_A   = Math.sin(angle);

  ctx.clearRect(0, 0, CSS, CSS);

  // Project all spikes
  const proj = spikes.map(({ nx, ny, nz }) => {

    // 1. Rotate around sphere's Y axis
    let rx = nx * cos_A + nz * sin_A;
    let ry = ny;
    let rz = -nx * sin_A + nz * cos_A;

    // 2. Apply fixed view tilt (X-axis rotation in view space)
    const ry2 = ry * cos_T - rz * sin_T;
    const rz2 = ry * sin_T + rz * cos_T;
    ry = ry2; rz = rz2;

    // 3. Perspective projection
    const zPx   = rz * SPHERE_R;
    const psc   = PERSP / (PERSP - zPx);           // perspective scale
    const ex    = CX + rx * SPHERE_R * psc;
    const ey    = CY + ry * SPHERE_R * psc;

    // Depth: 0 = farthest back, 1 = closest front
    const depth = (rz + 1) / 2;

    return { ex, ey, depth, rz };
  });

  // Sort back → front (painter's algorithm)
  proj.sort((a, b) => a.rz - b.rz);

  // Draw lines (all lines before dots, so dots always appear on top)
  for (const { ex, ey, depth } of proj) {
    const lw  = 0.35 + depth * 1.55;
    const op  = 0.12 + depth * 0.88;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(22,22,22,${op.toFixed(3)})`;
    ctx.lineWidth   = lw;
    ctx.stroke();
  }

  // Draw endpoint dots
  for (const { ex, ey, depth } of proj) {
    const r   = 1.5 + depth * 4.0;
    const op  = 0.15 + depth * 0.85;
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(22,22,22,${op.toFixed(3)})`;
    ctx.fill();
  }

  // Small center anchor dot
  ctx.beginPath();
  ctx.arc(CX, CY, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(22,22,22,0.45)';
  ctx.fill();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
